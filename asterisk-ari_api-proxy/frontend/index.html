<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Monitor | AudioSocket ASR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(239, 68, 68, 0.1) 0%, transparent 50%);
        }

        header {
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 1rem;
            flex-grow: 1;
        }

        .status-bar {
            display: flex;
            justify-content: flex-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            backdrop-filter: blur(12px);
        }

        .call-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .call-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .call-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.3);
        }

        .call-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--primary);
            opacity: 0.8;
        }

        .call-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .call-info {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .info-icon {
            color: var(--text-muted);
            width: 18px;
            height: 18px;
        }

        .info-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            width: 80px;
        }

        .info-value {
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .actions {
            margin-top: 2rem;
            display: flex;
            gap: 0.75rem;
        }

        button {
            flex: 1;
            padding: 0.75rem;
            border-radius: 0.75rem;
            border: none;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .btn-play {
            background: var(--primary);
            color: white;
        }

        .btn-play:hover {
            background: var(--primary-hover);
        }

        .btn-hangup {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-hangup:hover {
            background: var(--danger);
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }

        .pulse {
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(34, 197, 94, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(34, 197, 94, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
            }
        }

        .loader {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        footer {
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
        }
    </style>
</head>

<body>
    <header>
        <h1>Call Monitor <span
                style="font-weight: 300; font-size: 1rem; color: var(--text-muted); vertical-align: middle; margin-left: 10px;">AudioSocket
                ASR</span></h1>
    </header>

    <div class="container">
        <div class="status-bar">
            <div style="display: flex; align-items: center; gap: 0.75rem;">
                <div class="pulse"></div>
                <span id="call-count">Monitoring System Status...</span>
            </div>
            <div id="loading" class="loader" style="display: none;"></div>
        </div>

        <div id="call-grid" class="call-grid">
            <!-- Calls will be injected here -->
            <div class="empty-state">
                <i data-lucide="phone-off" style="width: 48px; height: 48px; margin-bottom: 1rem; opacity: 0.5;"></i>
                <p>No active AudioSocket calls detected.</p>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 Asterisk Quality Engineering Suite
    </footer>

    <script>
        const API_BASE = `${window.location.protocol}//${window.location.hostname}:8000/api`;
        const WS_URL = `ws://${window.location.hostname}:8000/ws/calls`;
        const callGrid = document.getElementById('call-grid');
        const callCountLabel = document.getElementById('call-count');
        const loadingSpinner = document.getElementById('loading');

        // State preservation for user interactions
        const userSelections = new Map();

        function handleSelectionChange(channelId, value) {
            userSelections.set(channelId, value);
        }

        async function fetchCalls() {
            loadingSpinner.style.display = 'block';
            try {
                const response = await fetch(`${API_BASE}/calls`);
                const calls = await response.json();
                renderCalls(calls);
            } catch (error) {
                console.error('Failed to fetch calls:', error);
                callCountLabel.innerText = 'Connection Error';
            } finally {
                loadingSpinner.style.display = 'none';
            }
        }

        function renderCalls(calls) {
            if (calls.length === 0) {
                callGrid.innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="phone-off" style="width: 48px; height: 48px; margin-bottom: 1rem; opacity: 0.5;"></i>
                        <p>No active AudioSocket calls detected.</p>
                    </div>
                `;
                lucide.createIcons();
                callCountLabel.innerText = '0 Active Calls';
                return;
            }

            callCountLabel.innerText = `${calls.length} Active Call${calls.length !== 1 ? 's' : ''}`;

            const html = calls.map(call => {
                const selectedSound = userSelections.get(call.channel_id) || 'hello-world';
                return `
                <div class="call-card" id="call-${call.channel_id}">
                    <div class="call-header">
                        <span class="badge">${call.type}</span>
                        <div style="color: var(--primary); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">
                            Target: ${call.role === 'inbound' ? 'Callee' : 'Caller'}
                        </div>
                        <div style="color: var(--success); font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 4px;">
                            <div class="pulse" style="width: 8px; height: 8px;"></div> LIVE
                        </div>
                    </div>
                    
                    <div class="call-info">
                        <div class="info-row">
                            <i data-lucide="user" class="info-icon"></i>
                            <span class="info-label">Caller</span>
                            <span class="info-value">${call.caller_id}</span>
                        </div>
                        <div class="info-row">
                            <i data-lucide="phone" class="info-icon"></i>
                            <span class="info-label">Callee</span>
                            <span class="info-value">${call.callee_id}</span>
                        </div>
                        <div class="info-row">
                            <i data-lucide="hash" class="info-icon"></i>
                            <span class="info-label">UUID</span>
                            <span class="info-value" style="font-size: 0.7rem; color: var(--text-muted);">${call.uuid.split('-')[0]}...</span>
                        </div>
                    </div>

                    <div class="actions">
                        <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap; width: 100%;">
                            <select id="sound-${call.channel_id}" 
                                onchange="handleSelectionChange('${call.channel_id}', this.value)"
                                style="flex: 1; min-width: 120px; padding: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: var(--text); font-size: 0.85rem; outline: none; transition: border-color 0.2s;">
                                <option value="hello-world" ${selectedSound === 'hello-world' ? 'selected' : ''}>Hello World</option>
                                <option value="KyvernoAspis" ${selectedSound === 'KyvernoAspis' ? 'selected' : ''}>Kyverno Aspis</option>
                                <option value="VishingAlert" ${selectedSound === 'VishingAlert' ? 'selected' : ''}>Vishing Alert</option>
                                <option value="vishing-detected" ${selectedSound === 'vishing-detected' ? 'selected' : ''}>Vishing Detected</option>
                                <option value="vishing-warning" ${selectedSound === 'vishing-warning' ? 'selected' : ''}>Vishing Warning</option>
                            </select>
                            <div style="display: flex; gap: 8px; flex: 1;">
                                <button class="btn-play" style="flex: 1;" onclick="playback('${call.channel_id}')">
                                    <i data-lucide="play-circle" style="width: 18px; height: 18px;"></i> Play
                                </button>
                                <button class="btn-hangup" style="flex: 1;" onclick='hangup(${JSON.stringify(call.all_channels).replace(/'/g, "\\'")})'>
                                    <i data-lucide="phone-off" style="width: 18px; height: 18px;"></i> End
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            }).join('');

            callGrid.innerHTML = html;
            lucide.createIcons();
        }

        async function playback(channelId) {
            const soundSelect = document.getElementById(`sound-${channelId}`);
            const soundName = soundSelect ? soundSelect.value : 'hello-world';
            try {
                const response = await fetch(`${API_BASE}/play/${channelId}?sound=${soundName}`, { method: 'POST' });
                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.detail || 'API returned an error');
                }
                showToast(`Playback started: ${soundName}`);
            } catch (error) {
                alert('Playback failed: ' + error.message);
            }
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.background = 'rgba(99, 102, 241, 0.9)';
            toast.style.color = 'white';
            toast.style.padding = '12px 24px';
            toast.style.borderRadius = '12px';
            toast.style.boxShadow = '0 10px 15px -3px rgba(0,0,0,0.3)';
            toast.style.zIndex = '1000';
            toast.style.backdropFilter = 'blur(10px)';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.5s';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        async function hangup(channels) {
            if (!confirm('Are you sure you want to terminate this call (all legs)?')) return;
            try {
                const response = await fetch(`${API_BASE}/hangup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(channels)
                });
                const result = await response.json();
                fetchCalls();
            } catch (error) {
                alert('Hangup failed');
            }
        }

        // --- WebSocket Logic ---
        let socket;
        function connectWebSocket() {
            socket = new WebSocket(WS_URL);

            socket.onopen = () => {
                console.log('Connected to WebSocket');
                document.querySelector('.status-bar .pulse').style.background = 'var(--success)';
            };

            socket.onmessage = (event) => {
                const calls = JSON.parse(event.data);
                renderCalls(calls);
            };

            socket.onclose = () => {
                console.log('WebSocket disconnected, retrying in 5s...');
                document.querySelector('.status-bar .pulse').style.background = 'var(--danger)';
                setTimeout(connectWebSocket, 5000);
            };

            socket.onerror = (err) => {
                console.error('WebSocket error:', err);
                socket.close();
            };
        }

        // Initialize
        lucide.createIcons();
        connectWebSocket();

        // Fallback polling (less aggressive)
        setInterval(() => {
            if (!socket || socket.readyState !== WebSocket.OPEN) {
                fetchCalls();
            }
        }, 5000);
    </script>
</body>

</html>
